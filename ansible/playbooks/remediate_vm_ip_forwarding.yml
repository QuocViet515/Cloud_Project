---
# Remediate: Disable IP forwarding on NIC
# Finding: AZ-VM-IPFWD-001
- name: Remediate VM IP Forwarding
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ resource_group }}"
    nic_name: "{{ nic_name }}"

  tasks:
    - name: Disable IP forwarding on NIC
      command: >
        az network nic update
        --resource-group {{ resource_group }}
        --name {{ nic_name }}
        --ip-forwarding false
      register: result
      changed_when: result.rc == 0

    - name: Log remediation
      debug:
        msg: "IP forwarding disabled on NIC {{ nic_name }}"
