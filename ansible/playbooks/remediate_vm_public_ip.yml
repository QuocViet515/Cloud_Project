---
# Remediate: Remove public IP from VM
# Finding: AZ-VM-PUBIP-001
- name: Remediate VM Public IP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ resource_group }}"
    vm_name: "{{ vm_name }}"

  tasks:
    - name: Get VM NIC info
      command: >
        az vm show
        --resource-group {{ resource_group }}
        --name {{ vm_name }}
        --query "networkProfile.networkInterfaces[].id"
        --output tsv
      register: nic_ids

    - name: Dissociate public IP from each NIC
      command: >
        az network nic ip-config update
        --resource-group {{ resource_group }}
        --nic-name {{ item | basename }}
        --name ipconfig1
        --remove publicIpAddress
      loop: "{{ nic_ids.stdout_lines }}"
      register: result
      changed_when: result.rc == 0
      ignore_errors: true

    - name: Log remediation
      debug:
        msg: "Public IPs removed from VM {{ vm_name }}"
