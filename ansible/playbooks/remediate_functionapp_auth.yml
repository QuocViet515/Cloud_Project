---
# Remediate: Enable authentication on Function App
# Finding: AZ-FunctionApp-Anonymous-001
- name: Remediate Function App Authentication
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ resource_group }}"
    resource_name: "{{ resource_name }}"

  tasks:
    - name: Enable built-in authentication on Function App
      command: >
        az webapp auth update
        --resource-group {{ resource_group }}
        --name {{ resource_name }}
        --enabled true
        --action LoginWithAzureActiveDirectory
      register: result
      changed_when: result.rc == 0

    - name: Log remediation
      debug:
        msg: "Authentication enabled on Function App {{ resource_name }}"
