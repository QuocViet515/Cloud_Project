---
# Remediate: Enable encryption on Azure Storage Account
# Finding: AZ-Storage-Encryption-001
- name: Remediate Storage Account Encryption
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ resource_group }}"
    resource_name: "{{ resource_name }}"

  tasks:
    - name: Enable blob encryption with Microsoft-managed keys
      command: >
        az storage account update
        --name {{ resource_name }}
        --resource-group {{ resource_group }}
        --encryption-services blob file
      register: result
      changed_when: result.rc == 0

    - name: Log remediation success
      debug:
        msg: "Encryption enabled on storage account {{ resource_name }}"
