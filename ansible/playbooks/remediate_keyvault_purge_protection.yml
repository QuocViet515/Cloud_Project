---
# Remediate: Enable Key Vault purge protection
# Finding: AZKV002
- name: Remediate Key Vault Purge Protection
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_name: "{{ resource_name }}"

  tasks:
    - name: Enable purge protection on Key Vault
      command: >
        az keyvault update
        --name {{ resource_name }}
        --enable-purge-protection true
      register: result
      changed_when: result.rc == 0

    - name: Log remediation
      debug:
        msg: "Purge protection enabled on Key Vault {{ resource_name }}"
