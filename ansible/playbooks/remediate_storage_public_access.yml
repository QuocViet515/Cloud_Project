---
# Remediate: Block public blob access on Azure Storage Account
# Finding: AZ-Storage-PublicBlob-001 / AZST001
- name: Remediate Storage Account Public Blob Access
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "{{ resource_group }}"
    resource_name: "{{ resource_name }}"

  tasks:
    - name: Disable public blob access on storage account
      command: >
        az storage account update
        --name {{ resource_name }}
        --resource-group {{ resource_group }}
        --allow-blob-public-access false
      register: result
      changed_when: result.rc == 0

    - name: Verify public blob access is disabled
      command: >
        az storage account show
        --name {{ resource_name }}
        --resource-group {{ resource_group }}
        --query "allowBlobPublicAccess"
      register: verify
      failed_when: "'false' not in verify.stdout"

    - name: Log remediation success
      debug:
        msg: "Successfully disabled public blob access on {{ resource_name }}"
