---
# Remediate: Apply tags to untagged resources
# Finding: AZ-RES-TAGS-001
- name: Remediate Missing Resource Tags
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_id: "{{ resource_id }}"

  tasks:
    - name: Apply default tags to resource
      command: >
        az resource tag
        --ids {{ resource_id }}
        --tags environment=needs-review owner=unassigned managed-by=auto-scanner
      register: result
      changed_when: result.rc == 0

    - name: Log remediation
      debug:
        msg: "Default tags applied to {{ resource_id }}"
