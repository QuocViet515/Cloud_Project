# Pipeline Configuration
# Edit this file to customize the scan pipeline behavior.

pipeline:
  # Environment identifier (affects triage decisions)
  environment: dev  # dev | staging | prod

  # Cloud provider
  provider: azure  # azure | aws | openstack

  # Active scanners (uncomment to enable)
  scanners:
    - custom          # built-in Azure SDK scanner (always available)
    # - scoutsuite    # requires: pip install scoutsuite
    # - cloudsploit   # requires: docker or cloudsploit-scan
    # - checkov       # requires: pip install checkov
    # - tfsec         # requires: tfsec binary
    # - trivy         # requires: trivy binary

  # Scheduling (cron expression for periodic scans)
  schedule:
    enabled: false
    cron: "0 */6 * * *"  # Every 6 hours

# Triage configuration
triage:
  # OPA server URL (leave empty to use static rules)
  opa_url: ""

  # Suppressed finding codes or resource:code pairs
  suppressions: []
  # Example:
  #   - "AZ-RES-TAGS-001"  # Suppress all tag findings
  #   - "/subscriptions/.../storageAccounts/test:AZST001"  # Suppress specific resource

# Remediation configuration
remediation:
  # Enable auto-remediation (set to false for dry-run)
  enabled: true

  # Only allow remediation during maintenance windows
  maintenance_window:
    enabled: false
    start_hour: 2   # 2 AM UTC
    end_hour: 6     # 6 AM UTC

  # Ansible configuration
  ansible:
    playbooks_dir: ./ansible/playbooks
    inventory: ./ansible/inventory.yml

  # Cloud Custodian configuration
  custodian:
    policies_dir: ./custodian/policies

# SIEM / Elasticsearch configuration
siem:
  elasticsearch:
    url: "http://localhost:9200"
    username: ""
    password: ""
  # Set to true to log findings to files when ES is unavailable
  file_fallback: true

# Notification configuration
notifications:
  slack:
    webhook_url: ""  # Set SLACK_WEBHOOK_URL env var
  teams:
    webhook_url: ""  # Set TEAMS_WEBHOOK_URL env var
  jira:
    url: ""          # Set JIRA_URL env var
    user: ""         # Set JIRA_USER env var
    project: "SEC"

# IaC PR flow configuration
iac_pr:
  github_token: ""      # Set GITHUB_TOKEN env var
  github_repository: "" # Set GITHUB_REPOSITORY env var (owner/repo)
  target_branch: main

# Evaluation metrics
metrics:
  # Track these KPIs after each pipeline run
  track:
    - detection_coverage
    - remediation_rate
    - mttr
    - false_positive_rate
    - compliance_score
